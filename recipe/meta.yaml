# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.44.0"

package:
  name: kitty
  version: ${{ version }}

source:
  - url: https://github.com/kovidgoyal/{{ name }}/releases/download/v{{ version }}/{{ name }}-{{ version }}.tar.xz
    sha256: bf62c5a25188b823b6a8c2ab3182c278d74d5bea9855ca5172af09bc5a969b67

build:
  number: 0
  skip: not linux

requirements:
  build:
    - {{ compiler('c') }}
    - pkg-config
    - make
  host:
    - python
    - dbus
    - xorg-libxcursor
    - xorg-libxrandr
    - xorg-libxi
    - xorg-libxinerama
    - xorg-xineramaproto
    - libglu
    - xorg-glproto
    - mesalib
    - libxkbcommon
    - harfbuzz
    - zlib
    - libpng
    - freetype
    - fontconfig
    - imagemagick
    - pygments
    - libcanberra
    - lcms2
  run:
    - python
    - imagemagick
    - pygments
    - xkeyboard-config
    - libcanberra

tests:
  script:
    - kitty --help

about:
  homepage: https://sw.kovidgoyal.net/kitty/
  license: GPL-3.0-only
  license_family: GPL
  license_file: LICENSE
  summary: A cross-platform, fast, feature full, GPU based terminal emulator
  documentation: https://sw.kovidgoyal.net/kitty/
  repository: https://github.com/kovidgoyal/kitty

extra:
  recipe-maintainers:
    - CJ-Wright
    - davidbrochart
